<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>5 Minute Loop Timer</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    width:95%;
}

#lap{
    font-size:24px;
    color:#bbb;
    margin-bottom:20px;
}

#timer{
    font-size:24vw;
    font-weight:bold;
}

.warning{
    color:#ff4444;
    animation:pulse .8s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
    }
}

button{
    padding:15px 20px;
    margin:6px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.start{
    background:#22c55e;
    color:white;
}

.pause{
    background:#f59e0b;
    color:white;
}

.end{
    background:#ef4444;
    color:white;
}

#popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.popup-card{
    background:#222;
    padding:25px;
    border-radius:12px;
    width:280px;
}

.popup-card h3{
    margin-top:0;
}

.yes{
    background:#22c55e;
    color:white;
}

.no{
    background:#666;
    color:white;
}
</style>
</head>
<body>

<div class="container">

    <div id="lap">Lap 1</div>

    <div id="timer">05:00</div>

    <div style="margin-top:25px;">
        <button class="start" onclick="startTimer()">Start</button>
        <button class="pause" onclick="pauseTimer()">Pause</button>
        <button class="end" onclick="showEndPopup()">End</button>
    </div>

</div>

<div id="popup">
    <div class="popup-card">
        <h3>End Session?</h3>

        <button class="yes" onclick="confirmEnd()">
            Yes
        </button>

        <button class="no" onclick="closePopup()">
            No
        </button>
    </div>
</div>

<script>

const DURATION = 300;

let remaining = DURATION;
let running = false;
let interval = null;
let lap = 1;

const timerEl = document.getElementById("timer");
const lapEl = document.getElementById("lap");

function beep(freq=800,duration=150){

    const ctx = new(window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    gain.gain.setValueAtTime(0.2,ctx.currentTime);

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        ctx.currentTime + duration/1000
    );

    osc.stop(ctx.currentTime + duration/1000);
}

function doubleDing(){

    beep(900,200);

    setTimeout(() => {
        beep(1200,200);
    },250);
}

function countdownDong(){

    beep(500,350);
}

function vibrate(pattern){

    if(navigator.vibrate){
        navigator.vibrate(pattern);
    }
}

function updateDisplay(){

    const m = Math.floor(remaining / 60);
    const s = remaining % 60;

    timerEl.textContent =
        String(m).padStart(2,"0")
        + ":"
        + String(s).padStart(2,"0");

    if(remaining <= 10){

        timerEl.classList.add("warning");
        document.body.style.background="#330000";

    }else{

        timerEl.classList.remove("warning");
        document.body.style.background="#000";
    }
}

function tick(){

    remaining--;

    if(remaining === 150){

        beep(1000,300);
        vibrate(200);
    }

    if(remaining === 3){

        countdownDong();
        vibrate(120);
    }

    if(remaining === 2){

        countdownDong();
        vibrate(120);
    }

    if(remaining === 1){

        countdownDong();
        vibrate(120);
    }

    if(remaining <= 0){

        doubleDing();

        vibrate([150,100,150]);

        lap++;

        lapEl.textContent = "Lap " + lap;

        remaining = DURATION;
    }

    updateDisplay();
}

async function startTimer(){

    if(running) return;

    doubleDing();   /* Start Signal */

    running = true;

    if("wakeLock" in navigator){

        try{
            await navigator.wakeLock.request("screen");
        }
        catch(e){}
    }

    interval = setInterval(tick,1000);
}

function pauseTimer(){

    running = false;

    clearInterval(interval);
}

function showEndPopup(){

    document.getElementById("popup").style.display="flex";
}

function closePopup(){

    document.getElementById("popup").style.display="none";
}

function confirmEnd(){

    pauseTimer();

    remaining = DURATION;
    lap = 1;

    lapEl.textContent = "Lap 1";

    updateDisplay();

    closePopup();
}

updateDisplay();

</script>

</body>
</html>
