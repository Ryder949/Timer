<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Loop Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-size:28px;
}

.icon-btn{
    background:none;
    border:none;
    color:white;
    font-size:28px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

svg{
    width:280px;
    height:280px;
}

.track{
    fill:none;
    stroke:#222;
    stroke-width:12;
}

.progress{
    fill:none;
    stroke:#22c55e;
    stroke-width:12;
    stroke-linecap:round;
    transform:rotate(-90deg);
    transform-origin:50% 50%;
    transition:stroke .3s;
}

.time{
    position:absolute;
    font-size:60px;
    font-weight:bold;
}

.ring-container{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.redPulse{
    animation:pulse .8s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

.stats{
    margin-top:-20px;
    line-height:1.8;
}

.controls{
    margin-top:20px;
}

button{
    padding:14px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:18px;
    color:white;
}

.start{background:#22c55e;}
.pause{background:#f59e0b;}
.end{background:#ef4444;}

.panel{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.card{
    background:#222;
    border-radius:12px;
    padding:20px;
    width:300px;
    text-align:left;
}

.card h2{
    margin-top:0;
}

.card label{
    display:block;
    margin:10px 0;
}

.card input[type="number"]{
    width:100%;
    padding:8px;
}

.save{
    background:#22c55e;
    margin-top:10px;
}

.close{
    background:#666;
}

</style>
</head>

<body>

<div class="topbar">

<button class="icon-btn"
onclick="openSettings()">
⚙️
</button>

<button id="installBtn"
class="icon-btn"
style="display:none">
⬇️
</button>

</div>

<div class="container">

<div class="ring-container">

<svg viewBox="0 0 200 200">

<circle
class="track"
cx="100"
cy="100"
r="85"/>

<circle
id="progressRing"
class="progress"
cx="100"
cy="100"
r="85"/>

</svg>

<div id="timerText"
class="time">
05:00
</div>

</div>

<div class="stats">

<div id="lapText">
Lap 1
</div>

<div id="totalTime">
Total Time: 0 min
</div>

</div>

<div class="controls">

<button
class="start"
onclick="startTimer()">
Start
</button>

<button
class="pause"
onclick="pauseTimer()">
Pause
</button>

<button
class="end"
onclick="showEndPopup()">
End
</button>

</div>

</div>

<div id="settingsPanel"
class="panel">

<div class="card">

<h2>Settings</h2>

<label>

Interval Length (minutes)

<input
id="durationInput"
type="number"
min="1"
max="120">

</label>

<label>
<input
id="soundToggle"
type="checkbox">
 Sound
</label>

<label>
<input
id="vibrationToggle"
type="checkbox">
 Vibration
</label>

<label>
<input
id="halfwayToggle"
type="checkbox">
 Halfway Alert
</label>

<label>
<input
id="countdownToggle"
type="checkbox">
 Final Countdown
</label>

<button
class="save"
onclick="saveSettings()">
Save
</button>

<button
class="close"
onclick="closeSettings()">
Close
</button>

</div>

</div>

<div id="endPopup"
class="panel">

<div class="card"
style="text-align:center">

<h2>End Session?</h2>

<button
class="save"
onclick="confirmEnd()">
Yes
</button>

<button
class="close"
onclick="closeEndPopup()">
No
</button>

</div>

</div>

<script>

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',
(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display='block';
});

installBtn.addEventListener(
'click',
async ()=>{
if(!deferredPrompt)return;
deferredPrompt.prompt();
});

const ring = document.getElementById("progressRing");
const timerText = document.getElementById("timerText");

const radius = 85;
const circumference = 2*Math.PI*radius;

ring.style.strokeDasharray = circumference;

let settings = JSON.parse(
localStorage.getItem("loopTimerSettings")
)||{
duration:5,
sound:true,
vibration:true,
halfway:true,
countdown:true
};

function loadSettings(){

durationInput.value=settings.duration;

soundToggle.checked=settings.sound;
vibrationToggle.checked=settings.vibration;
halfwayToggle.checked=settings.halfway;
countdownToggle.checked=settings.countdown;
}

loadSettings();

let DURATION=settings.duration*60;
let remaining=DURATION;
let running=false;
let interval=null;
let lap=1;

function beep(freq,duration){

if(!settings.sound)return;

const ctx =
new(window.AudioContext||
window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.frequency.value=freq;
osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime + duration/1000
);

osc.stop(
ctx.currentTime + duration/1000
);
}

function vibrate(pattern){

if(
settings.vibration &&
navigator.vibrate
){
navigator.vibrate(pattern);
}
}

function doubleDing(){

beep(900,180);

setTimeout(()=>{
beep(1200,180);
},250);
}

function updateDisplay(){

let m=Math.floor(remaining/60);
let s=remaining%60;

timerText.textContent=
String(m).padStart(2,"0")
+":"
+String(s).padStart(2,"0");

let percent =
remaining/DURATION;

ring.style.strokeDashoffset=
circumference*(1-percent);

if(remaining>30){

ring.style.stroke="#22c55e";

timerText.classList.remove(
"redPulse"
);

}else if(remaining>10){

ring.style.stroke="#f59e0b";

timerText.classList.remove(
"redPulse"
);

}else{

ring.style.stroke="#ef4444";

timerText.classList.add(
"redPulse"
);
}

document.getElementById(
"lapText"
).textContent=
"Lap "+lap;

document.getElementById(
"totalTime"
).textContent=
"Total Time: "
+((lap-1)*settings.duration)
+" min";
}

function tick(){

remaining--;

let halfway=
Math.floor(DURATION/2);

if(
remaining===halfway &&
settings.halfway
){
beep(1000,300);
vibrate(200);
}

if(
settings.countdown &&
[3,2,1].includes(remaining)
){
beep(500,300);
vibrate(100);
}

if(remaining<=0){

doubleDing();

vibrate([150,100,150]);

lap++;

remaining=DURATION;
}

updateDisplay();
}

async function startTimer(){

if(running)return;

doubleDing();

running=true;

if("wakeLock" in navigator){
try{
await navigator.wakeLock.request(
"screen"
);
}catch(e){}
}

interval=setInterval(
tick,
1000
);
}

function pauseTimer(){

running=false;

clearInterval(interval);
}

function showEndPopup(){
endPopup.style.display="flex";
}

function closeEndPopup(){
endPopup.style.display="none";
}

function confirmEnd(){

pauseTimer();

lap=1;

remaining=DURATION;

updateDisplay();

closeEndPopup();
}

function openSettings(){

loadSettings();

settingsPanel.style.display="flex";
}

function closeSettings(){

settingsPanel.style.display="none";
}

function saveSettings(){

settings={
duration:Number(
durationInput.value
),
sound:soundToggle.checked,
vibration:vibrationToggle.checked,
halfway:halfwayToggle.checked,
countdown:countdownToggle.checked
};

localStorage.setItem(
"loopTimerSettings",
JSON.stringify(settings)
);

DURATION=
settings.duration*60;

remaining=DURATION;

lap=1;

updateDisplay();

closeSettings();
}

updateDisplay();

if('serviceWorker' in navigator){
navigator.serviceWorker.register(
'service-worker.js'
);
}

</script>

</body>
</html>
